<html>
	<head>
		<title>Clue Capture Game</title>
		<link rel="stylesheet" href="../CSS/boardGameStyle.css" />
		<link rel="stylesheet" href="https://use.typekit.net/jfe7dsa.css" />
	</head>

	<body>
		<h1>Clue Capture</h1>
		<div class="game-board" id="gameBoard">
			<!-- Each card in the board -->
			<div class="card" data-name="1">🖤</div>
			<div class="card" data-name="2">✦</div>
			<div class="card" data-name="3">♋️</div>
			<div class="card" data-name="4">☣️</div>
			<div class="card" data-name="5">❌️</div>
			<div class="card" data-name="6">💔️</div>
			<div class="card" data-name="7">💬️</div>
			<div class="card" data-name="8">⛔️</div>
			<div class="card" data-name="9">🌐️</div>
			<div class="card" data-name="10">🔔️</div>
			<div class="card" data-name="11">◼️</div>
			<div class="card" data-name="12">⚠️</div>
			<div class="card" data-name="13">❕️</div>
			<div class="card" data-name="14">⚪️</div>
			<div class="card" data-name="15">🔸️</div>
			<div class="card" data-name="16">🎵️</div>
		</div>
		<button id="resetButton">Reset Game</button>
		<button id="rulesButton">Rules</button>

		<div class="image-container-right">
			<img src="../Images/Clue Captain blue artboard.png" alt="CLUE CAPTAIN" />
		</div>
		<div class="image-container-left">
			<img src="../Images/StickMan.png" alt="PLAYER ONE" />
		</div>

		<p class="image-caption-right">Clue Captain</p>

		<p id="playerName" class="image-caption-left"></p>
		<p id="scoreCounter" class="score-caption-left">Score: 0</p>
		<script>
			const name = localStorage.getItem("playerName") || "Player one";
			const playerNameElement = document.getElementById("playerName");
			if (playerNameElement) {
				playerNameElement.textContent = name;
			}
			//Difficult to put in TS so for now in HTML

			// Initialize score
			let score = 0;
			const scoreCounterElement = document.getElementById("scoreCounter");
			function updateScore(newScore) {
				score = newScore;
				if (scoreCounterElement) {
					scoreCounterElement.textContent = `Score: ${score}`;
				}
			}
		</script>

		<form id="hintForm">
			<label id="inputLabel">Enter Clue:</label>
			<input id="inputField" type="text" />
			<select name="numberOfCards" id="numberOfCards">
				<option value="1">1</option>
				<option value="2">2</option>
				<option value="3">3</option>
				<option value="4">4</option>
			</select>
		</form>

		<div id="rulesModal" class="modal">
			<div class="modal-content">
				<span class="close">&times;</span>
				<h2>Game Rules</h2>
				<p>Here are the rules of Clue Capture!</p>
				<ul>
					<li>Rule 1: Lorem Ipsum</li>
					<li>Rule 2: Lorem Ipsum</li>
					<li>Rule 3: Lorem Ipsum</li>
				</ul>
			</div>
		</div>

		<script src="../dist/script.js"></script>
		<script src="../dist/imageLoader.js"></script>
		<script src="../dist/rulesButton.js"></script>
		<script src="../dist/cardInteraction.js"></script>
	</body>
</html>
