<html>
	<head>
		<title>ClueCapture Game</title>
		<link rel="stylesheet" href="../CSS/boardGameStyle.css" />
		<link rel="stylesheet" href="https://use.typekit.net/jfe7dsa.css" />
	</head>

	<body>
		<h1>Clue Capture</h1>
		<div class="game-board" id="gameBoard">
			<!-- Each card in the board -->
			<div class="card" data-name="A">🖤</div>
			<div class="card" data-name="B">✦</div>
			<div class="card" data-name="C">♋️</div>
			<div class="card" data-name="D">☣️</div>
			<div class="card" data-name="A">❌️</div>
			<div class="card" data-name="B">💔️</div>
			<div class="card" data-name="C">💬️</div>
			<div class="card" data-name="D">⛔️</div>
			<div class="card" data-name="E">🌐️</div>
			<div class="card" data-name="F">🔔️</div>
			<div class="card" data-name="G">◼️</div>
			<div class="card" data-name="H">⚠️</div>
			<div class="card" data-name="E">❕️</div>
			<div class="card" data-name="F">⚪️</div>
			<div class="card" data-name="G">🔸️</div>
			<div class="card" data-name="H">🎵️</div>
		</div>
		<button id="resetButton">Reset Game</button>
		<button id="rulesButton">Rules</button>

		<div class="image-container-right">
			<img src="../Images/Clue Captain blue artboard.png" alt="CLUE CAPTAIN" />
		</div>
		<div class="image-container-left">
			<img src="../Images/StickMan.png" alt="PLAYER ONE" />
		</div>

		<p class="image-caption-right">Clue Captain</p>
		<p class="image-caption-left">Player One</p>

		<form id="hintForm">
			<label id="inputLabel">Enter Clue:</label>
			<input id="inputField" type="text" />
		</form>

		<div id="rulesModal" class="modal">
			<div class="modal-content">
				<span class="close">&times;</span>
				<h2>Game Rules</h2>
				<p>Here are the rules of Clue Capture!</p>
				<ul>
					<li>Rule 1: Lorem Ipsum</li>
					<li>Rule 2: Lorem Ipsum</li>
					<li>Rule 3: Lorem Ipsum</li>
				</ul>
			</div>
		</div>

		<script src="/Front-end/dist/script.js"></script>
		<script src="/Front-end/dist/imageLoader.js"></script>
		<script src="/Front-end/dist/rulesButton.js"></script>
	</body>
</html>
